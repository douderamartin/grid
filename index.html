<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Car Track Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hlavní menu -->
  <div id="menu-screen">
    <h1>Car Track Builder</h1>
    <div>
      <label>Velikost gridu: <input type="number" id="grid-size-input" value="20" min="5" max="40"></label>
    </div>
    <br>
    <button onclick="startNewMap()">Nová mapa</button>
    <button onclick="showLoadMenu()">Načíst mapu</button>
    <br>
    <button onclick="importMap()">Importovat mapu ze souboru</button>
    <input type="file" id="import-input" accept=".json" style="display:none;" onchange="handleImport(event)">
    <div id="load-list"></div>
  </div>

  <!-- Editor -->
  <div id="editor-screen" style="display:none;">
    <div id="toolbar">
      <button onclick="showMenu()">← Menu</button>
      <input type="text" id="map-name" placeholder="Název mapy">
      <button onclick="saveMap()">Uložit</button>
      <button onclick="exportMap()">Exportovat</button>
    </div>

    <!-- Paleta nástrojů -->
    <div id="palette">
      <span>Nástroj: </span>
      <button class="palette-btn active" onclick="selectTile('grass')" style="background:#4caf50;">Tráva</button>
      <button class="palette-btn" onclick="selectTile('road')" style="background:#9e9e9e;">Silnice</button>
      <button class="palette-btn" onclick="selectTile('water')" style="background:#2196f3;">Voda</button>
    </div>

    <div id="grid"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
